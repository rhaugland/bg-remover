<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BG Remover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Camera Screen ── */
    #camera-screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    #viewfinder {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #viewfinder video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #photo-count {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    #camera-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 20px;
      background: #111;
    }

    #shutter-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    #shutter-btn::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.1s;
    }

    #shutter-btn:active::after {
      transform: scale(0.9);
    }

    #shutter-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #next-btn {
      padding: 12px 28px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #next-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #next-btn:active { background: #1d4ed8; }

    /* ── Thumbnails ── */
    #thumbnail-strip {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #1a1a1a;
      min-height: 72px;
      align-items: center;
      overflow-x: auto;
    }

    .thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid #333;
      flex-shrink: 0;
      position: relative;
    }

    .thumb-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .thumb-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ef4444;
      color: #fff;
      border: 2px solid #1a1a1a;
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      z-index: 2;
    }

    /* ── Processing Screen ── */
    #processing-screen {
      display: none;
      flex-direction: column;
      height: 100dvh;
    }

    #processing-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
    }

    #back-btn {
      padding: 8px 20px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    #download-all-btn {
      padding: 8px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }

    #processing-status {
      font-size: 14px;
      color: #aaa;
    }

    #results-grid {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
    }

    .result-card canvas {
      width: 100%;
      display: block;
    }

    .result-actions {
      padding: 12px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .result-actions button {
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .result-label {
      padding: 12px 12px 0;
      font-size: 13px;
      color: #888;
    }

    /* ── Loader ── */
    .spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 16px;
    }

    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-text {
      font-size: 14px;
      color: #aaa;
    }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    #flash.fire {
      animation: flash-anim 0.15s ease-out;
    }

    @keyframes flash-anim {
      0% { opacity: 0.8; }
      100% { opacity: 0; }
    }

    /* ── Hidden canvas for captures ── */
    #capture-canvas { display: none; }
  </style>
</head>
<body>
  <div id="flash"></div>
  <canvas id="capture-canvas"></canvas>

  <!-- Camera Screen -->
  <div id="camera-screen">
    <div id="viewfinder">
      <video id="camera" autoplay playsinline muted></video>
      <div id="photo-count">0 / 5</div>
    </div>
    <div id="thumbnail-strip"></div>
    <div id="camera-controls">
      <button id="shutter-btn" aria-label="Take photo"></button>
      <button id="next-btn">Next</button>
    </div>
  </div>

  <!-- Processing Screen -->
  <div id="processing-screen">
    <div id="processing-header">
      <button id="back-btn">Back</button>
      <span id="processing-status"></span>
      <button id="download-all-btn">Save All</button>
    </div>
    <div id="results-grid"></div>
  </div>

  <script type="module">
    import imglyRemoveBackground from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm';

    const video = document.getElementById('camera');
    const shutterBtn = document.getElementById('shutter-btn');
    const nextBtn = document.getElementById('next-btn');
    const photoCount = document.getElementById('photo-count');
    const thumbnailStrip = document.getElementById('thumbnail-strip');
    const captureCanvas = document.getElementById('capture-canvas');
    const flash = document.getElementById('flash');
    const cameraScreen = document.getElementById('camera-screen');
    const processingScreen = document.getElementById('processing-screen');
    const resultsGrid = document.getElementById('results-grid');
    const statusEl = document.getElementById('processing-status');
    const backBtn = document.getElementById('back-btn');
    const downloadAllBtn = document.getElementById('download-all-btn');

    let photos = []; // array of Blob
    let stream = null;

    // ── Start camera ──
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        alert('Camera access is required. Please allow camera permissions and reload.');
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    // ── Capture photo ──
    function capturePhoto() {
      if (photos.length >= 5) return;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      captureCanvas.width = vw;
      captureCanvas.height = vh;
      const ctx = captureCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0, vw, vh);

      // Flash effect
      flash.classList.remove('fire');
      void flash.offsetWidth;
      flash.classList.add('fire');

      captureCanvas.toBlob(blob => {
        photos.push(blob);
        updateUI();
      }, 'image/jpeg', 0.92);
    }

    function removePhoto(index) {
      photos.splice(index, 1);
      updateUI();
    }

    function updateUI() {
      photoCount.textContent = `${photos.length} / 5`;
      shutterBtn.disabled = photos.length >= 5;
      nextBtn.classList.toggle('visible', photos.length > 0);

      thumbnailStrip.innerHTML = '';
      photos.forEach((blob, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'thumb-wrapper';

        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = URL.createObjectURL(blob);

        const removeBtn = document.createElement('div');
        removeBtn.className = 'thumb-remove';
        removeBtn.textContent = 'x';
        removeBtn.onclick = () => removePhoto(i);

        wrapper.appendChild(img);
        wrapper.appendChild(removeBtn);
        thumbnailStrip.appendChild(wrapper);
      });
    }

    // ── Process images ──
    async function processImages() {
      cameraScreen.style.display = 'none';
      processingScreen.style.display = 'flex';
      resultsGrid.innerHTML = '';
      downloadAllBtn.style.display = 'none';
      stopCamera();

      const resultBlobs = [];

      for (let i = 0; i < photos.length; i++) {
        statusEl.textContent = `Processing ${i + 1} of ${photos.length}...`;

        // Show spinner for current image
        const spinnerEl = document.createElement('div');
        spinnerEl.className = 'spinner';
        spinnerEl.innerHTML = `
          <div class="spinner-ring"></div>
          <div class="progress-text">Removing background (${i + 1}/${photos.length})...</div>
        `;
        resultsGrid.appendChild(spinnerEl);

        try {
          const removedBlob = await imglyRemoveBackground(photos[i], {
            publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/',
            progress: (key, current, total) => {
              if (key === 'compute:inference') {
                const pct = Math.round((current / total) * 100);
                const prog = spinnerEl.querySelector('.progress-text');
                if (prog) prog.textContent = `Removing background (${i + 1}/${photos.length})... ${pct}%`;
              }
            }
          });

          // Draw on canvas with black background
          const img = await createImageBitmap(removedBlob);
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);

          // Replace spinner with result
          const card = document.createElement('div');
          card.className = 'result-card';

          const label = document.createElement('div');
          label.className = 'result-label';
          label.textContent = `Photo ${i + 1}`;

          const resultCanvas = document.createElement('canvas');
          resultCanvas.width = canvas.width;
          resultCanvas.height = canvas.height;
          resultCanvas.getContext('2d').drawImage(canvas, 0, 0);

          const actions = document.createElement('div');
          actions.className = 'result-actions';

          const dlBtn = document.createElement('button');
          dlBtn.textContent = 'Save';
          dlBtn.onclick = () => downloadCanvas(resultCanvas, `photo-${i + 1}.png`);

          actions.appendChild(dlBtn);
          card.appendChild(label);
          card.appendChild(resultCanvas);
          card.appendChild(actions);
          spinnerEl.replaceWith(card);

          // Store for download-all
          resultBlobs.push({ canvas: resultCanvas, index: i + 1 });

        } catch (err) {
          console.error('BG removal failed:', err);
          spinnerEl.innerHTML = `<div class="progress-text" style="color:#ef4444">Failed to process photo ${i + 1}</div>`;
        }
      }

      statusEl.textContent = 'Done';
      if (resultBlobs.length > 1) {
        downloadAllBtn.style.display = 'block';
        downloadAllBtn.onclick = () => {
          resultBlobs.forEach(r => downloadCanvas(r.canvas, `photo-${r.index}.png`));
        };
      }
    }

    function downloadCanvas(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // ── Back to camera ──
    async function goBack() {
      processingScreen.style.display = 'none';
      cameraScreen.style.display = 'flex';
      photos = [];
      updateUI();
      await startCamera();
    }

    // ── Event listeners ──
    shutterBtn.addEventListener('click', capturePhoto);
    nextBtn.addEventListener('click', processImages);
    backBtn.addEventListener('click', goBack);

    // ── Init ──
    startCamera();
  </script>
</body>
</html>
