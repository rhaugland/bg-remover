<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BG Remover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── Camera Screen ── */
    #camera-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* Viewfinder fills entire screen */
    #viewfinder {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 0;
    }

    #viewfinder video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Top bar overlay */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: env(safe-area-inset-top, 12px) 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      padding-top: max(env(safe-area-inset-top, 12px), 16px);
    }

    #app-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }

    #photo-count {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Bottom controls overlay */
    #bottom-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
      padding-bottom: max(env(safe-area-inset-bottom, 20px), 24px);
    }

    /* Thumbnail strip */
    #thumbnail-strip {
      display: flex;
      gap: 10px;
      padding: 0 20px 20px;
      align-items: center;
      justify-content: center;
      min-height: 0;
      overflow-x: auto;
      scrollbar-width: none;
      transition: min-height 0.3s, padding 0.3s, opacity 0.3s;
    }

    #thumbnail-strip::-webkit-scrollbar { display: none; }

    #thumbnail-strip.has-photos {
      min-height: 64px;
      padding: 12px 20px 20px;
    }

    .thumb-wrapper {
      position: relative;
      flex-shrink: 0;
      animation: thumb-pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes thumb-pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .thumb {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.3);
      display: block;
    }

    .thumb-remove {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,60,60,0.9);
      backdrop-filter: blur(4px);
      color: #fff;
      border: 2px solid rgba(0,0,0,0.5);
      font-size: 13px;
      font-weight: 600;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      z-index: 2;
    }

    /* Shutter area */
    #shutter-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      position: relative;
      height: 88px;
    }

    #shutter-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.9);
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      -webkit-appearance: none;
      outline: none;
      transition: transform 0.15s;
    }

    #shutter-btn::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      transition: transform 0.1s ease;
    }

    #shutter-btn:active {
      transform: scale(0.92);
    }

    #shutter-btn:active::after {
      transform: scale(0.85);
    }

    #shutter-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    #shutter-btn:disabled:active {
      transform: none;
    }

    /* Next button - positioned right of shutter */
    #next-btn {
      position: absolute;
      right: 24px;
      padding: 12px 24px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
      transition: opacity 0.25s, transform 0.25s;
      -webkit-appearance: none;
    }

    #next-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    #next-btn:active {
      background: rgba(255,255,255,0.8);
      transform: scale(0.95);
    }

    /* ── Processing Screen ── */
    #processing-screen {
      display: none;
      flex-direction: column;
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 20;
    }

    #processing-header {
      padding: max(env(safe-area-inset-top, 12px), 16px) 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0a0a0a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #back-btn {
      padding: 8px 18px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    #back-btn:active { background: rgba(255,255,255,0.2); }

    #download-all-btn {
      padding: 8px 18px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    #download-all-btn:active { background: rgba(255,255,255,0.8); }

    #processing-status {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3px;
    }

    #results-grid {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      padding-bottom: max(env(safe-area-inset-bottom, 16px), 24px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .result-card {
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .result-card canvas {
      width: 100%;
      display: block;
    }

    .result-actions {
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .result-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
    }

    .result-actions button {
      padding: 8px 20px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    .result-actions button:active {
      background: rgba(255,255,255,0.2);
    }

    /* ── Loader ── */
    .spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 16px;
      background: #111;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .spinner-ring {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-text {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    #flash.fire {
      animation: flash-anim 0.12s ease-out;
    }

    @keyframes flash-anim {
      0% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    #capture-canvas { display: none; }
  </style>
</head>
<body>
  <div id="flash"></div>
  <canvas id="capture-canvas"></canvas>

  <!-- Camera Screen -->
  <div id="camera-screen">
    <div id="viewfinder">
      <video id="camera" autoplay playsinline muted></video>
    </div>

    <div id="top-bar">
      <span id="app-title">BG Remover</span>
      <span id="photo-count">0 / 5</span>
    </div>

    <div id="bottom-controls">
      <div id="thumbnail-strip"></div>
      <div id="shutter-area">
        <button id="shutter-btn" aria-label="Take photo"></button>
        <button id="next-btn">Next</button>
      </div>
    </div>
  </div>

  <!-- Processing Screen -->
  <div id="processing-screen">
    <div id="processing-header">
      <button id="back-btn">Back</button>
      <span id="processing-status"></span>
      <button id="download-all-btn">Save All</button>
    </div>
    <div id="results-grid"></div>
  </div>

  <script type="module">
    import imglyRemoveBackground from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm';

    const video = document.getElementById('camera');
    const shutterBtn = document.getElementById('shutter-btn');
    const nextBtn = document.getElementById('next-btn');
    const photoCount = document.getElementById('photo-count');
    const thumbnailStrip = document.getElementById('thumbnail-strip');
    const captureCanvas = document.getElementById('capture-canvas');
    const flash = document.getElementById('flash');
    const cameraScreen = document.getElementById('camera-screen');
    const processingScreen = document.getElementById('processing-screen');
    const resultsGrid = document.getElementById('results-grid');
    const statusEl = document.getElementById('processing-status');
    const backBtn = document.getElementById('back-btn');
    const downloadAllBtn = document.getElementById('download-all-btn');

    let photos = [];
    let stream = null;

    async function startCamera() {
      const constraints = [
        { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false },
        { video: { facingMode: 'environment' }, audio: false },
        { video: { facingMode: 'user' }, audio: false },
        { video: true, audio: false }
      ];

      for (const c of constraints) {
        try {
          stream = await navigator.mediaDevices.getUserMedia(c);
          video.srcObject = stream;
          await video.play();
          return;
        } catch (err) {
          console.warn('Constraint failed, trying next:', err.message);
        }
      }
      alert('Camera access is required. Please allow camera permissions and reload.');
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    function capturePhoto() {
      if (photos.length >= 5) return;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      captureCanvas.width = vw;
      captureCanvas.height = vh;
      const ctx = captureCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0, vw, vh);

      flash.classList.remove('fire');
      void flash.offsetWidth;
      flash.classList.add('fire');

      captureCanvas.toBlob(blob => {
        photos.push(blob);
        updateUI();
      }, 'image/jpeg', 0.92);
    }

    function removePhoto(index) {
      photos.splice(index, 1);
      updateUI();
    }

    function updateUI() {
      photoCount.textContent = `${photos.length} / 5`;
      shutterBtn.disabled = photos.length >= 5;
      nextBtn.classList.toggle('visible', photos.length > 0);
      thumbnailStrip.classList.toggle('has-photos', photos.length > 0);

      thumbnailStrip.innerHTML = '';
      photos.forEach((blob, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'thumb-wrapper';

        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = URL.createObjectURL(blob);

        const removeBtn = document.createElement('div');
        removeBtn.className = 'thumb-remove';
        removeBtn.textContent = '\u00d7';
        removeBtn.onclick = (e) => { e.stopPropagation(); removePhoto(i); };

        wrapper.appendChild(img);
        wrapper.appendChild(removeBtn);
        thumbnailStrip.appendChild(wrapper);
      });
    }

    async function processImages() {
      cameraScreen.style.display = 'none';
      processingScreen.style.display = 'flex';
      resultsGrid.innerHTML = '';
      downloadAllBtn.style.display = 'none';
      stopCamera();

      const resultBlobs = [];

      for (let i = 0; i < photos.length; i++) {
        statusEl.textContent = `${i + 1} of ${photos.length}`;

        const spinnerEl = document.createElement('div');
        spinnerEl.className = 'spinner';
        spinnerEl.innerHTML = `
          <div class="spinner-ring"></div>
          <div class="progress-text">Removing background ${i + 1}/${photos.length}...</div>
        `;
        resultsGrid.appendChild(spinnerEl);

        try {
          const removedBlob = await imglyRemoveBackground(photos[i], {
            publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/',
            progress: (key, current, total) => {
              if (key === 'compute:inference') {
                const pct = Math.round((current / total) * 100);
                const prog = spinnerEl.querySelector('.progress-text');
                if (prog) prog.textContent = `Processing ${i + 1}/${photos.length}... ${pct}%`;
              }
            }
          });

          const img = await createImageBitmap(removedBlob);
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);

          const card = document.createElement('div');
          card.className = 'result-card';

          const resultCanvas = document.createElement('canvas');
          resultCanvas.width = canvas.width;
          resultCanvas.height = canvas.height;
          resultCanvas.getContext('2d').drawImage(canvas, 0, 0);

          const actions = document.createElement('div');
          actions.className = 'result-actions';

          const label = document.createElement('span');
          label.className = 'result-label';
          label.textContent = `Photo ${i + 1}`;

          const dlBtn = document.createElement('button');
          dlBtn.textContent = 'Save';
          dlBtn.onclick = () => downloadCanvas(resultCanvas, `photo-${i + 1}.png`);

          actions.appendChild(label);
          actions.appendChild(dlBtn);
          card.appendChild(resultCanvas);
          card.appendChild(actions);
          spinnerEl.replaceWith(card);

          resultBlobs.push({ canvas: resultCanvas, index: i + 1 });

        } catch (err) {
          console.error('BG removal failed:', err);
          spinnerEl.innerHTML = `<div class="progress-text" style="color:#ff6b6b">Failed to process photo ${i + 1}</div>`;
        }
      }

      statusEl.textContent = 'Done';
      if (resultBlobs.length > 0) {
        downloadAllBtn.style.display = 'block';
        downloadAllBtn.onclick = () => {
          resultBlobs.forEach(r => downloadCanvas(r.canvas, `photo-${r.index}.png`));
        };
      }
    }

    function downloadCanvas(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function goBack() {
      processingScreen.style.display = 'none';
      cameraScreen.style.display = 'flex';
      photos = [];
      updateUI();
      await startCamera();
    }

    shutterBtn.addEventListener('click', capturePhoto);
    nextBtn.addEventListener('click', processImages);
    backBtn.addEventListener('click', goBack);

    startCamera();
  </script>
</body>
</html>
