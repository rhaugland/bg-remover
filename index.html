<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BG Remover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100dvh;
      width: 100vw;
      overflow: hidden;
    }

    body.scrollable {
      overflow: auto;
      position: static;
    }

    /* ── Camera Screen ── */
    #camera-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* Viewfinder fills entire screen */
    #viewfinder {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 0;
    }

    #viewfinder video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Top bar overlay */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: env(safe-area-inset-top, 12px) 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      padding-top: max(env(safe-area-inset-top, 12px), 16px);
    }

    #app-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }

    #photo-count {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Bottom controls overlay */
    #bottom-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
      padding-bottom: max(env(safe-area-inset-bottom, 20px), 24px);
    }

    /* Thumbnail strip */
    #thumbnail-strip {
      display: flex;
      gap: 10px;
      padding: 0 20px 20px;
      align-items: center;
      justify-content: center;
      min-height: 0;
      overflow-x: auto;
      scrollbar-width: none;
      transition: min-height 0.3s, padding 0.3s, opacity 0.3s;
    }

    #thumbnail-strip::-webkit-scrollbar { display: none; }

    #thumbnail-strip.has-photos {
      min-height: 64px;
      padding: 12px 20px 20px;
    }

    .thumb-wrapper {
      position: relative;
      flex-shrink: 0;
      animation: thumb-pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes thumb-pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .thumb {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.3);
      display: block;
    }

    .thumb-remove {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,60,60,0.9);
      backdrop-filter: blur(4px);
      color: #fff;
      border: 2px solid rgba(0,0,0,0.5);
      font-size: 13px;
      font-weight: 600;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      z-index: 2;
    }

    /* Zoom slider */
    #zoom-control {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 40px 16px;
    }

    #zoom-control.visible { display: flex; }

    .zoom-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      min-width: 32px;
      text-align: center;
    }

    #zoom-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
    }

    #zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    #zoom-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: none;
    }

    /* Shutter area */
    #shutter-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      position: relative;
      height: 88px;
    }

    #shutter-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.9);
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      -webkit-appearance: none;
      outline: none;
      transition: transform 0.15s;
    }

    #shutter-btn::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      transition: transform 0.1s ease;
    }

    #shutter-btn:active {
      transform: scale(0.92);
    }

    #shutter-btn:active::after {
      transform: scale(0.85);
    }

    #shutter-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    #shutter-btn:disabled:active {
      transform: none;
    }

    /* Next button - positioned right of shutter */
    #next-btn {
      position: absolute;
      right: 24px;
      padding: 12px 24px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
      transition: opacity 0.25s, transform 0.25s;
      -webkit-appearance: none;
    }

    #next-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    #next-btn:active {
      background: rgba(255,255,255,0.8);
      transform: scale(0.95);
    }

    /* ── Processing Screen ── */
    #processing-screen {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
      background: #000;
      z-index: 20;
    }

    #processing-header {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: max(env(safe-area-inset-top, 12px), 16px) 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0a0a0a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #back-btn {
      padding: 8px 18px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    #back-btn:active { background: rgba(255,255,255,0.2); }

    #download-all-btn {
      padding: 8px 18px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    #download-all-btn:active { background: rgba(255,255,255,0.8); }

    #processing-status {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3px;
    }

    #results-grid {
      padding: 16px;
      padding-bottom: max(env(safe-area-inset-bottom, 16px), 40px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .result-card {
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .drag-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      overflow: hidden;
      touch-action: none;
      cursor: grab;
    }

    .drag-stage:active { cursor: grabbing; }

    .drag-stage img {
      position: absolute;
      max-width: 80%;
      max-height: 80%;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    .drag-hint {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(128,128,128,0.6);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .drag-stage.dragged .drag-hint { opacity: 0; }

    /* ── Background color picker ── */
    .bg-picker {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .bg-picker-label {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-right: 4px;
      white-space: nowrap;
    }

    .bg-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
      -webkit-appearance: none;
      padding: 0;
      outline: none;
    }

    .bg-swatch:active { transform: scale(0.9); }

    .bg-swatch.active {
      border-color: #fff;
      border-width: 3px;
    }

    .bg-custom-input {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
      padding: 0;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }

    .bg-custom-input.active {
      border-color: #fff;
      border-width: 3px;
    }

    .bg-custom-input input {
      position: absolute;
      inset: -4px;
      width: 36px;
      height: 36px;
      border: none;
      cursor: pointer;
      -webkit-appearance: none;
      padding: 0;
    }

    .result-actions {
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .result-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
    }

    .result-actions button {
      padding: 8px 20px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    .result-actions button:active {
      background: rgba(255,255,255,0.2);
    }

    /* ── Loader ── */
    .spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 16px;
      background: #111;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .spinner-ring {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-text {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    #flash.fire {
      animation: flash-anim 0.12s ease-out;
    }

    @keyframes flash-anim {
      0% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    #capture-canvas { display: none; }

  </style>
</head>
<body>
  <div id="flash"></div>
  <canvas id="capture-canvas"></canvas>

  <!-- Camera Screen -->
  <div id="camera-screen">
    <div id="viewfinder">
      <video id="camera" autoplay playsinline muted></video>
    </div>

    <div id="top-bar">
      <span id="app-title">BG Remover</span>
      <span id="photo-count">0 / 5</span>
    </div>

    <div id="bottom-controls">
      <div id="thumbnail-strip"></div>
      <div id="zoom-control">
        <span class="zoom-label">1x</span>
        <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
        <span class="zoom-label" id="zoom-max">5x</span>
      </div>
      <div id="shutter-area">
        <button id="shutter-btn" aria-label="Take photo"></button>
        <button id="next-btn">Next</button>
      </div>
    </div>
  </div>

  <!-- Processing Screen -->
  <div id="processing-screen">
    <div id="processing-header">
      <button id="back-btn">Back</button>
      <span id="processing-status"></span>
      <button id="download-all-btn">Save All</button>
    </div>
    <div id="results-grid"></div>
  </div>

  <script>
    const video = document.getElementById('camera');
    const shutterBtn = document.getElementById('shutter-btn');
    const nextBtn = document.getElementById('next-btn');
    const photoCount = document.getElementById('photo-count');
    const thumbnailStrip = document.getElementById('thumbnail-strip');
    const captureCanvas = document.getElementById('capture-canvas');
    const zoomControl = document.getElementById('zoom-control');
    const zoomSlider = document.getElementById('zoom-slider');
    const zoomMaxLabel = document.getElementById('zoom-max');
    const flash = document.getElementById('flash');
    const cameraScreen = document.getElementById('camera-screen');
    const processingScreen = document.getElementById('processing-screen');
    const resultsGrid = document.getElementById('results-grid');
    const statusEl = document.getElementById('processing-status');
    const backBtn = document.getElementById('back-btn');
    const downloadAllBtn = document.getElementById('download-all-btn');

    let photos = [];
    let stream = null;
    let cameraReady = false;
    video.setAttribute('webkit-playsinline', '');

    // ── Camera ──
    async function startCamera() {
      const constraints = [
        { video: { facingMode: { exact: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false },
        { video: { facingMode: 'environment' }, audio: false },
        { video: { facingMode: 'user' }, audio: false },
        { video: true, audio: false }
      ];

      for (const c of constraints) {
        try {
          stream = await navigator.mediaDevices.getUserMedia(c);
          video.srcObject = stream;
          await new Promise((resolve, reject) => {
            video.onloadedmetadata = () => {
              video.play().then(resolve).catch(reject);
            };
            setTimeout(() => reject(new Error('Video load timeout')), 5000);
          });
          cameraReady = true;
          setupZoom();
          return;
        } catch (err) {
          console.warn('Constraint failed, trying next:', err.message);
          if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
          }
        }
      }
      alert('Could not access camera. Please check permissions in Settings > Safari > Camera and reload.');
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      cameraReady = false;
      zoomControl.classList.remove('visible');
    }

    function setupZoom() {
      try {
        const track = stream.getVideoTracks()[0];
        const capabilities = track.getCapabilities ? track.getCapabilities() : {};

        if (capabilities.zoom) {
          const min = capabilities.zoom.min || 1;
          const max = capabilities.zoom.max || 1;

          if (max > min) {
            zoomSlider.min = min;
            zoomSlider.max = max;
            zoomSlider.step = (max - min) / 50;
            zoomSlider.value = min;
            zoomMaxLabel.textContent = max.toFixed(0) + 'x';
            zoomControl.classList.add('visible');
          }
        }
      } catch (e) {
        console.warn('Zoom not supported:', e);
      }
    }

    zoomSlider.addEventListener('input', () => {
      if (!stream) return;
      try {
        const track = stream.getVideoTracks()[0];
        track.applyConstraints({ advanced: [{ zoom: parseFloat(zoomSlider.value) }] });
      } catch (e) {
        console.warn('Zoom failed:', e);
      }
    });

    function capturePhoto() {
      if (photos.length >= 5 || !cameraReady) return;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;
      captureCanvas.width = vw;
      captureCanvas.height = vh;
      const ctx = captureCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0, vw, vh);

      flash.classList.remove('fire');
      void flash.offsetWidth;
      flash.classList.add('fire');

      captureCanvas.toBlob(blob => {
        photos.push(blob);
        updateUI();
      }, 'image/jpeg', 0.92);
    }

    function removePhoto(index) {
      photos.splice(index, 1);
      updateUI();
    }

    function updateUI() {
      photoCount.textContent = `${photos.length} / 5`;
      shutterBtn.disabled = photos.length >= 5;
      nextBtn.classList.toggle('visible', photos.length > 0);
      thumbnailStrip.classList.toggle('has-photos', photos.length > 0);

      thumbnailStrip.innerHTML = '';
      photos.forEach((blob, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'thumb-wrapper';

        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = URL.createObjectURL(blob);

        const removeBtn = document.createElement('div');
        removeBtn.className = 'thumb-remove';
        removeBtn.textContent = '\u00d7';
        removeBtn.onclick = (e) => { e.stopPropagation(); removePhoto(i); };

        wrapper.appendChild(img);
        wrapper.appendChild(removeBtn);
        thumbnailStrip.appendChild(wrapper);
      });
    }

    // ── Process images — send to server for product extraction ──
    async function processImages() {
      cameraScreen.style.display = 'none';
      processingScreen.style.display = 'flex';
      document.body.classList.add('scrollable');
      resultsGrid.innerHTML = '';
      downloadAllBtn.style.display = 'none';
      stopCamera();

      const resultItems = [];

      for (let i = 0; i < photos.length; i++) {
        statusEl.textContent = `${i + 1} of ${photos.length}`;

        const spinnerEl = document.createElement('div');
        spinnerEl.className = 'spinner';
        spinnerEl.innerHTML = `
          <div class="spinner-ring"></div>
          <div class="progress-text">Extracting product ${i + 1}/${photos.length}...</div>
        `;
        resultsGrid.appendChild(spinnerEl);

        try {
          const dataUrl = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(photos[i]);
          });

          const prog = spinnerEl.querySelector('.progress-text');
          if (prog) prog.textContent = `Processing ${i + 1}/${photos.length}...`;

          const resp = await fetch('/api/remove-bg', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataUrl }),
          });

          if (!resp.ok) {
            const errData = await resp.json().catch(() => ({}));
            throw new Error(errData.error || resp.statusText);
          }

          const { image: resultDataUrl } = await resp.json();

          // Load transparent PNG
          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
            img.src = resultDataUrl;
          });

          // Build draggable result card
          const card = document.createElement('div');
          card.className = 'result-card';

          const stage = document.createElement('div');
          stage.className = 'drag-stage';

          const productImg = document.createElement('img');
          productImg.src = resultDataUrl;
          productImg.draggable = false;

          const hint = document.createElement('div');
          hint.className = 'drag-hint';
          hint.textContent = 'Drag to move \u00b7 Pinch to resize';

          stage.appendChild(productImg);
          stage.appendChild(hint);

          // Center product initially after stage is in DOM
          const item = { stage, productImg, img, index: i + 1, x: 0, y: 0, imgScale: 1, bgColor: '#000000' };
          makeDraggable(item);

          // Background color picker
          const picker = buildBgPicker(item);

          const actions = document.createElement('div');
          actions.className = 'result-actions';

          const label = document.createElement('span');
          label.className = 'result-label';
          label.textContent = `Photo ${i + 1}`;

          const dlBtn = document.createElement('button');
          dlBtn.textContent = 'Save';
          dlBtn.onclick = () => saveResult(item);

          actions.appendChild(label);
          actions.appendChild(dlBtn);
          card.appendChild(stage);
          card.appendChild(picker);
          card.appendChild(actions);
          spinnerEl.replaceWith(card);

          // Center after DOM insertion
          requestAnimationFrame(() => {
            const sw = stage.offsetWidth;
            const sh = stage.offsetHeight;
            const iw = productImg.offsetWidth;
            const ih = productImg.offsetHeight;
            item.x = (sw - iw) / 2;
            item.y = (sh - ih) / 2;
            productImg.style.left = item.x + 'px';
            productImg.style.top = item.y + 'px';
          });

          resultItems.push(item);

        } catch (err) {
          console.error('BG removal failed:', err);
          spinnerEl.innerHTML = `<div class="progress-text" style="color:#ff6b6b">Failed: ${err.message}</div>`;
        }
      }

      statusEl.textContent = 'Done';
      if (resultItems.length > 0) {
        downloadAllBtn.style.display = 'block';
        downloadAllBtn.onclick = () => {
          resultItems.forEach(r => saveResult(r));
        };
      }
    }

    // ── Background color picker ──
    const presetColors = [
      { color: '#000000', label: 'Black' },
      { color: '#FFFFFF', label: 'White' },
      { color: '#F5F5F5', label: 'Light gray' },
      { color: '#1a1a2e', label: 'Navy' },
    ];

    function buildBgPicker(item) {
      const row = document.createElement('div');
      row.className = 'bg-picker';

      const lbl = document.createElement('span');
      lbl.className = 'bg-picker-label';
      lbl.textContent = 'BG';
      row.appendChild(lbl);

      const swatches = [];

      presetColors.forEach(({ color }) => {
        const btn = document.createElement('button');
        btn.className = 'bg-swatch' + (color === item.bgColor ? ' active' : '');
        btn.style.background = color;
        btn.onclick = () => {
          item.bgColor = color;
          item.stage.style.background = color;
          swatches.forEach(s => s.classList.remove('active'));
          customWrap.classList.remove('active');
          btn.classList.add('active');
        };
        swatches.push(btn);
        row.appendChild(btn);
      });

      // Custom color input
      const customWrap = document.createElement('div');
      customWrap.className = 'bg-custom-input';
      customWrap.style.background = '#ff6600';
      const customInput = document.createElement('input');
      customInput.type = 'color';
      customInput.value = '#ff6600';
      customInput.onchange = () => {
        item.bgColor = customInput.value;
        item.stage.style.background = customInput.value;
        customWrap.style.background = customInput.value;
        swatches.forEach(s => s.classList.remove('active'));
        customWrap.classList.add('active');
      };
      customInput.oninput = () => {
        item.bgColor = customInput.value;
        item.stage.style.background = customInput.value;
        customWrap.style.background = customInput.value;
        swatches.forEach(s => s.classList.remove('active'));
        customWrap.classList.add('active');
      };
      customWrap.appendChild(customInput);
      row.appendChild(customWrap);

      return row;
    }

    // ── Drag + pinch-to-resize ──
    function makeDraggable(item) {
      const { stage, productImg } = item;
      let dragging = false;
      let pinching = false;
      let startX, startY, origX, origY;
      let startDist, origScale;

      function applyTransform() {
        productImg.style.left = item.x + 'px';
        productImg.style.top = item.y + 'px';
        productImg.style.transform = `scale(${item.imgScale})`;
        productImg.style.transformOrigin = '0 0';
      }

      function getTouchDist(t1, t2) {
        const dx = t1.clientX - t2.clientX;
        const dy = t1.clientY - t2.clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function getTouchCenter(t1, t2) {
        return {
          x: (t1.clientX + t2.clientX) / 2,
          y: (t1.clientY + t2.clientY) / 2,
        };
      }

      // Touch events
      stage.addEventListener('touchstart', (e) => {
        e.preventDefault();
        stage.classList.add('dragged');

        if (e.touches.length === 1) {
          dragging = true;
          pinching = false;
          const rect = stage.getBoundingClientRect();
          startX = e.touches[0].clientX - rect.left;
          startY = e.touches[0].clientY - rect.top;
          origX = item.x;
          origY = item.y;
        } else if (e.touches.length === 2) {
          dragging = false;
          pinching = true;
          startDist = getTouchDist(e.touches[0], e.touches[1]);
          origScale = item.imgScale;
          const rect = stage.getBoundingClientRect();
          const center = getTouchCenter(e.touches[0], e.touches[1]);
          startX = center.x - rect.left;
          startY = center.y - rect.top;
          origX = item.x;
          origY = item.y;
        }
      }, { passive: false });

      stage.addEventListener('touchmove', (e) => {
        e.preventDefault();

        if (dragging && e.touches.length === 1) {
          const rect = stage.getBoundingClientRect();
          const cx = e.touches[0].clientX - rect.left;
          const cy = e.touches[0].clientY - rect.top;
          item.x = origX + (cx - startX);
          item.y = origY + (cy - startY);
          applyTransform();
        } else if (e.touches.length === 2) {
          // Switch to pinch if started as drag
          if (!pinching) {
            pinching = true;
            dragging = false;
            startDist = getTouchDist(e.touches[0], e.touches[1]);
            origScale = item.imgScale;
            const rect = stage.getBoundingClientRect();
            const center = getTouchCenter(e.touches[0], e.touches[1]);
            startX = center.x - rect.left;
            startY = center.y - rect.top;
            origX = item.x;
            origY = item.y;
          }

          const dist = getTouchDist(e.touches[0], e.touches[1]);
          const scaleFactor = dist / startDist;
          item.imgScale = Math.max(0.1, Math.min(5, origScale * scaleFactor));

          // Pan with pinch center
          const rect = stage.getBoundingClientRect();
          const center = getTouchCenter(e.touches[0], e.touches[1]);
          const cx = center.x - rect.left;
          const cy = center.y - rect.top;
          item.x = origX + (cx - startX);
          item.y = origY + (cy - startY);

          applyTransform();
        }
      }, { passive: false });

      stage.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
          dragging = false;
          pinching = false;
        } else if (e.touches.length === 1) {
          // Went from pinch back to one finger — restart drag
          pinching = false;
          dragging = true;
          const rect = stage.getBoundingClientRect();
          startX = e.touches[0].clientX - rect.left;
          startY = e.touches[0].clientY - rect.top;
          origX = item.x;
          origY = item.y;
        }
      });

      // Mouse drag
      stage.addEventListener('mousedown', (e) => {
        e.preventDefault();
        dragging = true;
        stage.classList.add('dragged');
        const rect = stage.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        origX = item.x;
        origY = item.y;
      });

      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const rect = stage.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        item.x = origX + (cx - startX);
        item.y = origY + (cy - startY);
        applyTransform();
      });

      window.addEventListener('mouseup', () => { dragging = false; });

      // Mouse wheel zoom (desktop)
      stage.addEventListener('wheel', (e) => {
        e.preventDefault();
        stage.classList.add('dragged');
        const delta = e.deltaY > 0 ? 0.95 : 1.05;
        item.imgScale = Math.max(0.1, Math.min(5, item.imgScale * delta));
        applyTransform();
      }, { passive: false });
    }

    // ── Render final position to canvas and download ──
    function saveResult(item) {
      const { stage, productImg, img, index, x, y, imgScale } = item;
      const sw = stage.offsetWidth;
      const sh = stage.offsetHeight;

      // Render at high resolution (2x for retina)
      const renderScale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = sw * renderScale;
      canvas.height = sh * renderScale;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = item.bgColor || '#000000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw product at its dragged position and pinch scale
      const baseW = productImg.naturalWidth * (productImg.offsetWidth / productImg.naturalWidth);
      const baseH = productImg.naturalHeight * (productImg.offsetHeight / productImg.naturalHeight);
      const drawW = baseW * imgScale * renderScale;
      const drawH = baseH * imgScale * renderScale;
      ctx.drawImage(img, x * renderScale, y * renderScale, drawW, drawH);

      const link = document.createElement('a');
      link.download = `product-${index}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function goBack() {
      processingScreen.style.display = 'none';
      document.body.classList.remove('scrollable');
      cameraScreen.style.display = 'flex';
      photos = [];
      updateUI();
      await startCamera();
    }

    shutterBtn.addEventListener('click', capturePhoto);
    nextBtn.addEventListener('click', processImages);
    backBtn.addEventListener('click', goBack);

    startCamera();
  </script>
</body>
</html>
