<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BG Remover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100dvh;
      width: 100vw;
      overflow: hidden;
    }

    body.scrollable {
      overflow: auto;
      position: static;
    }

    /* ── Camera Screen ── */
    #camera-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* Viewfinder fills entire screen */
    #viewfinder {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 0;
    }

    #viewfinder video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Top bar overlay */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: env(safe-area-inset-top, 12px) 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      padding-top: max(env(safe-area-inset-top, 12px), 16px);
    }

    #app-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }

    #photo-count {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Bottom controls overlay */
    #bottom-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
      padding-bottom: max(env(safe-area-inset-bottom, 20px), 24px);
    }

    /* Thumbnail strip */
    #thumbnail-strip {
      display: flex;
      gap: 10px;
      padding: 0 20px 20px;
      align-items: center;
      justify-content: center;
      min-height: 0;
      overflow-x: auto;
      scrollbar-width: none;
      transition: min-height 0.3s, padding 0.3s, opacity 0.3s;
    }

    #thumbnail-strip::-webkit-scrollbar { display: none; }

    #thumbnail-strip.has-photos {
      min-height: 64px;
      padding: 12px 20px 20px;
    }

    .thumb-wrapper {
      position: relative;
      flex-shrink: 0;
      animation: thumb-pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes thumb-pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .thumb {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.3);
      display: block;
    }

    .thumb-remove {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,60,60,0.9);
      backdrop-filter: blur(4px);
      color: #fff;
      border: 2px solid rgba(0,0,0,0.5);
      font-size: 13px;
      font-weight: 600;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      z-index: 2;
    }

    /* Shutter area */
    #shutter-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      position: relative;
      height: 88px;
    }

    #shutter-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.9);
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      -webkit-appearance: none;
      outline: none;
      transition: transform 0.15s;
    }

    #shutter-btn::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      transition: transform 0.1s ease;
    }

    #shutter-btn:active {
      transform: scale(0.92);
    }

    #shutter-btn:active::after {
      transform: scale(0.85);
    }

    #shutter-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    #shutter-btn:disabled:active {
      transform: none;
    }

    /* Next button - positioned right of shutter */
    #next-btn {
      position: absolute;
      right: 24px;
      padding: 12px 24px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
      transition: opacity 0.25s, transform 0.25s;
      -webkit-appearance: none;
    }

    #next-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    #next-btn:active {
      background: rgba(255,255,255,0.8);
      transform: scale(0.95);
    }

    /* ── Processing Screen ── */
    #processing-screen {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
      background: #000;
      z-index: 20;
    }

    #processing-header {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: max(env(safe-area-inset-top, 12px), 16px) 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0a0a0a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #back-btn {
      padding: 8px 18px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    #back-btn:active { background: rgba(255,255,255,0.2); }

    #download-all-btn {
      padding: 8px 18px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    #download-all-btn:active { background: rgba(255,255,255,0.8); }

    #processing-status {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3px;
    }

    #results-grid {
      padding: 16px;
      padding-bottom: max(env(safe-area-inset-bottom, 16px), 40px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .result-card {
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .drag-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      overflow: hidden;
      touch-action: none;
      cursor: grab;
    }

    .drag-stage:active { cursor: grabbing; }

    .drag-stage img {
      position: absolute;
      max-width: 80%;
      max-height: 80%;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    .drag-hint {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .drag-stage.dragged .drag-hint { opacity: 0; }

    .result-actions {
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .result-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
    }

    .result-actions button {
      padding: 8px 20px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s;
    }

    .result-actions button:active {
      background: rgba(255,255,255,0.2);
    }

    /* ── Loader ── */
    .spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 16px;
      background: #111;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .spinner-ring {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-text {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    #flash.fire {
      animation: flash-anim 0.12s ease-out;
    }

    @keyframes flash-anim {
      0% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    #capture-canvas { display: none; }

  </style>
</head>
<body>
  <div id="flash"></div>
  <canvas id="capture-canvas"></canvas>

  <!-- Camera Screen -->
  <div id="camera-screen">
    <div id="viewfinder">
      <video id="camera" autoplay playsinline muted></video>
    </div>

    <div id="top-bar">
      <span id="app-title">BG Remover</span>
      <span id="photo-count">0 / 5</span>
    </div>

    <div id="bottom-controls">
      <div id="thumbnail-strip"></div>
      <div id="shutter-area">
        <button id="shutter-btn" aria-label="Take photo"></button>
        <button id="next-btn">Next</button>
      </div>
    </div>
  </div>

  <!-- Processing Screen -->
  <div id="processing-screen">
    <div id="processing-header">
      <button id="back-btn">Back</button>
      <span id="processing-status"></span>
      <button id="download-all-btn">Save All</button>
    </div>
    <div id="results-grid"></div>
  </div>

  <script>
    const video = document.getElementById('camera');
    const shutterBtn = document.getElementById('shutter-btn');
    const nextBtn = document.getElementById('next-btn');
    const photoCount = document.getElementById('photo-count');
    const thumbnailStrip = document.getElementById('thumbnail-strip');
    const captureCanvas = document.getElementById('capture-canvas');
    const flash = document.getElementById('flash');
    const cameraScreen = document.getElementById('camera-screen');
    const processingScreen = document.getElementById('processing-screen');
    const resultsGrid = document.getElementById('results-grid');
    const statusEl = document.getElementById('processing-status');
    const backBtn = document.getElementById('back-btn');
    const downloadAllBtn = document.getElementById('download-all-btn');

    let photos = [];
    let stream = null;
    let cameraReady = false;
    video.setAttribute('webkit-playsinline', '');

    // ── Camera ──
    async function startCamera() {
      const constraints = [
        { video: { facingMode: { exact: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false },
        { video: { facingMode: 'environment' }, audio: false },
        { video: { facingMode: 'user' }, audio: false },
        { video: true, audio: false }
      ];

      for (const c of constraints) {
        try {
          stream = await navigator.mediaDevices.getUserMedia(c);
          video.srcObject = stream;
          await new Promise((resolve, reject) => {
            video.onloadedmetadata = () => {
              video.play().then(resolve).catch(reject);
            };
            setTimeout(() => reject(new Error('Video load timeout')), 5000);
          });
          cameraReady = true;
          return;
        } catch (err) {
          console.warn('Constraint failed, trying next:', err.message);
          if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
          }
        }
      }
      alert('Could not access camera. Please check permissions in Settings > Safari > Camera and reload.');
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      cameraReady = false;
    }

    function capturePhoto() {
      if (photos.length >= 5 || !cameraReady) return;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;
      captureCanvas.width = vw;
      captureCanvas.height = vh;
      const ctx = captureCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0, vw, vh);

      flash.classList.remove('fire');
      void flash.offsetWidth;
      flash.classList.add('fire');

      captureCanvas.toBlob(blob => {
        photos.push(blob);
        updateUI();
      }, 'image/jpeg', 0.92);
    }

    function removePhoto(index) {
      photos.splice(index, 1);
      updateUI();
    }

    function updateUI() {
      photoCount.textContent = `${photos.length} / 5`;
      shutterBtn.disabled = photos.length >= 5;
      nextBtn.classList.toggle('visible', photos.length > 0);
      thumbnailStrip.classList.toggle('has-photos', photos.length > 0);

      thumbnailStrip.innerHTML = '';
      photos.forEach((blob, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'thumb-wrapper';

        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = URL.createObjectURL(blob);

        const removeBtn = document.createElement('div');
        removeBtn.className = 'thumb-remove';
        removeBtn.textContent = '\u00d7';
        removeBtn.onclick = (e) => { e.stopPropagation(); removePhoto(i); };

        wrapper.appendChild(img);
        wrapper.appendChild(removeBtn);
        thumbnailStrip.appendChild(wrapper);
      });
    }

    // ── Process images — send to server for product extraction ──
    async function processImages() {
      cameraScreen.style.display = 'none';
      processingScreen.style.display = 'flex';
      document.body.classList.add('scrollable');
      resultsGrid.innerHTML = '';
      downloadAllBtn.style.display = 'none';
      stopCamera();

      const resultItems = [];

      for (let i = 0; i < photos.length; i++) {
        statusEl.textContent = `${i + 1} of ${photos.length}`;

        const spinnerEl = document.createElement('div');
        spinnerEl.className = 'spinner';
        spinnerEl.innerHTML = `
          <div class="spinner-ring"></div>
          <div class="progress-text">Extracting product ${i + 1}/${photos.length}...</div>
        `;
        resultsGrid.appendChild(spinnerEl);

        try {
          const dataUrl = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(photos[i]);
          });

          const prog = spinnerEl.querySelector('.progress-text');
          if (prog) prog.textContent = `Processing ${i + 1}/${photos.length}...`;

          const resp = await fetch('/api/remove-bg', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataUrl }),
          });

          if (!resp.ok) {
            const errData = await resp.json().catch(() => ({}));
            throw new Error(errData.error || resp.statusText);
          }

          const { image: resultDataUrl } = await resp.json();

          // Load transparent PNG
          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
            img.src = resultDataUrl;
          });

          // Build draggable result card
          const card = document.createElement('div');
          card.className = 'result-card';

          const stage = document.createElement('div');
          stage.className = 'drag-stage';

          const productImg = document.createElement('img');
          productImg.src = resultDataUrl;
          productImg.draggable = false;

          const hint = document.createElement('div');
          hint.className = 'drag-hint';
          hint.textContent = 'Drag to reposition';

          stage.appendChild(productImg);
          stage.appendChild(hint);

          // Center product initially after stage is in DOM
          const item = { stage, productImg, img, index: i + 1, x: 0, y: 0 };
          makeDraggable(item);

          const actions = document.createElement('div');
          actions.className = 'result-actions';

          const label = document.createElement('span');
          label.className = 'result-label';
          label.textContent = `Photo ${i + 1}`;

          const dlBtn = document.createElement('button');
          dlBtn.textContent = 'Save';
          dlBtn.onclick = () => saveResult(item);

          actions.appendChild(label);
          actions.appendChild(dlBtn);
          card.appendChild(stage);
          card.appendChild(actions);
          spinnerEl.replaceWith(card);

          // Center after DOM insertion
          requestAnimationFrame(() => {
            const sw = stage.offsetWidth;
            const sh = stage.offsetHeight;
            const iw = productImg.offsetWidth;
            const ih = productImg.offsetHeight;
            item.x = (sw - iw) / 2;
            item.y = (sh - ih) / 2;
            productImg.style.left = item.x + 'px';
            productImg.style.top = item.y + 'px';
          });

          resultItems.push(item);

        } catch (err) {
          console.error('BG removal failed:', err);
          spinnerEl.innerHTML = `<div class="progress-text" style="color:#ff6b6b">Failed: ${err.message}</div>`;
        }
      }

      statusEl.textContent = 'Done';
      if (resultItems.length > 0) {
        downloadAllBtn.style.display = 'block';
        downloadAllBtn.onclick = () => {
          resultItems.forEach(r => saveResult(r));
        };
      }
    }

    // ── Drag to reposition ──
    function makeDraggable(item) {
      const { stage, productImg } = item;
      let dragging = false;
      let startX, startY, origX, origY;

      function onStart(clientX, clientY) {
        dragging = true;
        stage.classList.add('dragged');
        const rect = stage.getBoundingClientRect();
        startX = clientX - rect.left;
        startY = clientY - rect.top;
        origX = item.x;
        origY = item.y;
      }

      function onMove(clientX, clientY) {
        if (!dragging) return;
        const rect = stage.getBoundingClientRect();
        const cx = clientX - rect.left;
        const cy = clientY - rect.top;
        item.x = origX + (cx - startX);
        item.y = origY + (cy - startY);
        productImg.style.left = item.x + 'px';
        productImg.style.top = item.y + 'px';
      }

      function onEnd() {
        dragging = false;
      }

      // Touch events
      stage.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          e.preventDefault();
          onStart(e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: false });

      stage.addEventListener('touchmove', (e) => {
        if (dragging && e.touches.length === 1) {
          e.preventDefault();
          onMove(e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: false });

      stage.addEventListener('touchend', onEnd);

      // Mouse events
      stage.addEventListener('mousedown', (e) => {
        e.preventDefault();
        onStart(e.clientX, e.clientY);
      });

      window.addEventListener('mousemove', (e) => {
        onMove(e.clientX, e.clientY);
      });

      window.addEventListener('mouseup', onEnd);
    }

    // ── Render final position to canvas and download ──
    function saveResult(item) {
      const { stage, productImg, img, index, x, y } = item;
      const sw = stage.offsetWidth;
      const sh = stage.offsetHeight;

      // Render at high resolution (2x for retina)
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = sw * scale;
      canvas.height = sh * scale;
      const ctx = canvas.getContext('2d');

      // Black background
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw product at its dragged position, scaled
      const imgDisplayW = productImg.offsetWidth;
      const imgDisplayH = productImg.offsetHeight;
      ctx.drawImage(img, x * scale, y * scale, imgDisplayW * scale, imgDisplayH * scale);

      const link = document.createElement('a');
      link.download = `product-${index}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function goBack() {
      processingScreen.style.display = 'none';
      document.body.classList.remove('scrollable');
      cameraScreen.style.display = 'flex';
      photos = [];
      updateUI();
      await startCamera();
    }

    shutterBtn.addEventListener('click', capturePhoto);
    nextBtn.addEventListener('click', processImages);
    backBtn.addEventListener('click', goBack);

    startCamera();
  </script>
</body>
</html>
